<!-- 
    Change Log
    Focus on Time - Foonti v1.6.5
    Änderungen: 
    - Logik: Die Drag-Sperre prüft nun nur noch Partikel, die sich innerhalb der Breite des Glases befinden.
    - Optimierung: Sand, der neben das Glas fällt, blockiert das Verschieben nicht mehr.
    - UI: Der "SAND FÄLLT NOCH..."-Hinweis erscheint nur bei Partikeln im Zielbereich des Glases.
    - Erhalt: Alle bisherigen Effekte (Wolke, Endless Paper, Nav-Pfeile, stabile Slider).
    - Alle Kommentare und physikalischen Logiken beibehalten.
    - Logik: Präzise Volumen-Zeit-Kopplung beibehalten.
    - UI: Kompaktes vertikales Design integriert.
    - Alle Effekte (Pulse, Glow, Explosion, Dampf) integriert.
    - Neu: Präzise Volumen-Zeit-Kopplung (Sandmenge entspricht exakt dem Timer-Fortschritt)
    - Neu: Proportionale Füllhöhe egal ob 1 Minute oder 120 Minuten Dauer
    - UI: Kompaktes vertikales Design (v1.3.8) beibehalten
    - Logik: Symmetrisches Resize (v1.3.6) beibehalten
    - Alle Effekte (Pulse, Glow, Explosion, Dampf) integriert
    - UI: Kompakteres Design (360px Breite) für bessere Übersichtlichkeit
    - UI: Optimierte Touch-Bereiche für Regler und Buttons
    - Logik: Symmetrisches Resize und stabile UI-Position (v1.3.6) erhalten
    - Alle Effekte (Pulsieren, Explosion, Dampf) bleiben vollständig erhalten
    - Fehlerbehebung: Flackern der Pulsation durch Phasen-Akkumulation (smooth transitions) behoben
    - Optimierung: Pulsationsrate dynamisch angepasst (65 BPM bis 200 BPM vor der Explosion)
    - Optimierung: Pulsieren massiv verlangsamt (Human Heartbeat Rhythmus), startet extrem ruhig
    - Optimierung: Beschleunigungskurve erhöht (Cubic-Out), damit die Ruhe länger anhält
    - Neu: Glas-Explosion wenn die Count-up Zeit die ursprüngliche Dauer erreicht
    - Neu: Sand verteilt sich bei Explosion über den gesamten Screen
    - Neu: Dampf-Effekt nach Abschluss des Timers (läuft nach Explosion weiter)
    - Neu: Count-up Timer im aufsteigenden Dampf zeigt verstrichene Zeit nach Ende
    - Neu: Pulsierender Sandeffekt bei Fertigstellung
    - Neu: Anpassbarer Name auf dem Tag (Standard: "Fokus"), editierbar über die UI
    - Neu: "Spill"-Effekt (Sand außerhalb des Glases) drastisch reduziert für "Versehen"-Optik
    - Optimierung: Partikel-System verbessert durch Schwerkraft-Beschleunigung und Wobble-Effekt
    - Optimierung: Verfeinerte findSettleIndex Logik für natürlichere Schüttkegel (Sandhaufen)
    - Visuell: Partikel pulsieren leicht in ihrer Opazität beim Fallen für organischen Glanz
    - Neu: Das Glas bietet nun immer Platz für 5 Minuten mehr als eingestellt (Puffer-Volumen)
    - Optimierung: spawnChance Berechnung korrigiert, um die Zielhöhe exakt zu treffen
    - UI: Messpunkte und Skalierung berücksichtigen nun die 5-Minuten-Erweiterung
    - Fehlerbehebung: Flackern minimiert durch strikte Render-Order und Alpha-Reset im Buffer
    - Optimierung: Sand-Abstand zur Glaswand vergrößert (Kollisionsschutz)
    - Neu: Sand bündig auf dem Glasboden (Offset Korrektur auf thickness/2)
    - Neu: Sand näher an die Glaswände gerückt (Marge reduziert)
    - Neu: Physikalisch korrekte Kurven-Kollision in den Glasecken (Radius 15px) 
-->
<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Foonti v1.6.5 - Präzise Drag-Sperre</title>
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #e0e0e0;
            --accent-color: #7b2ff7;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text-color);
            user-select: none;
            touch-action: none;
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: grab;
        }
        
        #canvas-container:active {
            cursor: grabbing;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        .glass-controls {
            position: absolute;
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.8rem;
            pointer-events: none;
            width: auto; 
            min-width: 200px;
            transform-origin: top center;
        }

        .glass-controls > * {
            pointer-events: all;
        }

        .input-group {
            background: rgba(255, 255, 255, 0.05);
            padding: 1rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            gap: 14px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.7);
            width: 90vw;
            max-width: 280px;
        }

        .control-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
        }

        .control-stack {
            display: flex;
            flex-direction: column;
            gap: 6px;
            width: 100%;
        }

        .divider-h {
            width: 100%;
            height: 1px;
            background: rgba(255, 255, 255, 0.08);
        }

        .label-small {
            font-size: 0.65rem;
            opacity: 0.5;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            font-weight: 600;
        }

        input[type="number"], input[type="range"] {
            background: transparent;
            border: none;
            color: white;
            outline: none;
        }

        input[type="number"] {
            width: 45px;
            font-size: 1rem;
            text-align: right;
            font-weight: 600;
            padding: 4px;
        }

        input[type="text"] {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 8px;
            color: white;
            width: 130px;
            font-size: 1rem;
            text-align: left;
            outline: none;
            padding: 6px 10px;
            font-weight: 500;
        }

        input[type="range"] {
            width: 100%;
            cursor: pointer;
            height: 24px;
            accent-color: var(--accent-color);
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            background: transparent;
        }
        input[type="color"]::-webkit-color-swatch {
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
        }

        .button-row {
            display: flex;
            gap: 0.8rem;
            flex-wrap: wrap;
            justify-content: center;
            width: 90vw;
            max-width: 350px;
        }

        button {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: white;
            padding: 0.7rem 1.2rem;
            border-radius: 22px;
            cursor: pointer;
            backdrop-filter: blur(15px);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            font-weight: 700;
            min-height: 44px;
        }

        button:active {
            transform: scale(0.95);
            background: rgba(255, 255, 255, 0.15);
        }
        
        button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            filter: grayscale(1);
        }

        #shareBtn {
            background: rgba(123, 47, 247, 0.2);
            border-color: rgba(123, 47, 247, 0.4);
        }

        .drag-hint {
            position: absolute;
            top: -28px;
            font-size: 0.65rem;
            opacity: 0.4;
            white-space: nowrap;
            background: rgba(0,0,0,0.4);
            padding: 2px 8px;
            border-radius: 10px;
            transition: color 0.2s, opacity 0.2s;
        }

        .nav-arrow {
            position: fixed;
            width: 44px;
            height: 44px;
            background: var(--accent-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(123, 47, 247, 0.5);
            transition: transform 0.2s;
            pointer-events: all;
        }
        
        .nav-arrow:hover { transform: scale(1.1); }
        .nav-arrow svg { fill: white; width: 20px; height: 20px; }

        .hidden { display: none !important; }
        .disabled-hint { color: #ff5555; opacity: 1; font-weight: 800; }

        #toast {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            padding: 12px 24px;
            border-radius: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-size: 0.8rem;
            color: white;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            z-index: 2000;
        }
    </style>
</head>
<body>

    <div id="canvas-container">
        <canvas id="sandCanvas"></canvas>
        
        <div id="glassControls" class="glass-controls">
            <div class="drag-hint" id="dragHint">Ziehen zum Bewegen</div>
            
            <div class="input-group" id="settings-group">
                <div class="control-row">
                    <input type="text" id="tagNameInput" value="Fokus" placeholder="Name" maxlength="12">
                    <input type="color" id="tagColorInput" value="#191919">
                </div>
                <div class="divider-h"></div>
                <div class="control-row">
                    <span class="label-small">Dauer (min)</span>
                    <input type="number" id="minutesInput" value="25" min="1" max="120">
                </div>
                <div class="control-stack">
                    <div class="control-row">
                        <span class="label-small">Breite</span>
                        <span id="widthLabel" class="label-small" style="opacity: 0.4;">280</span>
                    </div>
                    <input type="range" id="widthInput" min="120" max="500" value="280">
                </div>
                <div class="control-stack">
                    <div class="control-row">
                        <span class="label-small">Höhe</span>
                        <span id="heightLabel" class="label-small" style="opacity: 0.4;">380</span>
                    </div>
                    <input type="range" id="heightInput" min="150" max="600" value="380">
                </div>
            </div>

            <div class="button-row">
                <button id="startBtn">Start</button>
                <button id="resetBtn" class="hidden">Reset</button>
                <button id="shareBtn">Link teilen</button>
            </div>
        </div>
    </div>

    <div id="navArrow" class="nav-arrow hidden">
        <svg viewBox="0 0 24 24"><path d="M12 2L4.5 20.29l.71.71L12 18l6.79 3 .71-.71z"/></svg>
    </div>

    <div id="toast">Link kopiert</div>

    <script>
        const canvas = document.getElementById('sandCanvas');
        const ctx = canvas.getContext('2d');

        const controls = document.getElementById('glassControls');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const shareBtn = document.getElementById('shareBtn');
        const minutesInput = document.getElementById('minutesInput');
        const widthInput = document.getElementById('widthInput');
        const heightInput = document.getElementById('heightInput');
        const widthLabel = document.getElementById('widthLabel');
        const heightLabel = document.getElementById('heightLabel');
        const tagColorInput = document.getElementById('tagColorInput');
        const tagNameInput = document.getElementById('tagNameInput');
        const settingsGroup = document.getElementById('settings-group');
        const dragHint = document.getElementById('dragHint');
        const toast = document.getElementById('toast');
        const navArrow = document.getElementById('navArrow');

        let width, height;
        let particles = [];
        let steamParticles = [];
        let isActive = false;
        let isFinished = false;
        let isExploded = false;
        let isRemoteTimer = false; 
        let isAdjusting = false; 
        let duration = 25 * 60; 
        let timeRemaining = duration;
        let timeSinceFinished = 0;
        let lastUpdateTime = 0; 
        let startTimeTimestamp = null; 
        let tagColor = '#191919';
        let tagName = 'Fokus';
        let pulsePhase = 0;

        let camera = {
            x: 0, y: 0, zoom: 1,
            targetX: 0, targetY: 0,
            isPanning: false,
            lastMouse: { x: 0, y: 0 },
            isAnimating: false
        };

        let glass = { 
            x: 0, y: 0, w: 280, h: 380, 
            thickness: 6, cornerRadius: 15,
            isDragging: false, dragOffset: { x: 0, y: 0 },
            buffer: document.createElement('canvas'),
            ctx: null
        };
        glass.ctx = glass.buffer.getContext('2d');

        let glassSandHeights = [];
        let spawnChance = 0.3;

        const phases = [
            { limit: 0.8, h: 263, s: 92, l: 60, label: 'Ankommen' },
            { limit: 0.4, h: 222, s: 74, l: 45, label: 'Deep Flow' },
            { limit: 0.1, h: 180, s: 100, l: 25, label: 'Endspurt' },
            { limit: 0, h: 45, s: 100, l: 50, label: 'Abschluss' }
        ];

        function init() {
            resize();
            glass.x = -glass.w / 2;
            glass.y = -glass.h / 2;
            camera.x = width / 2;
            camera.y = height / 2;
            
            parseUrlParams();

            window.addEventListener('resize', resize);
            window.addEventListener('mousedown', onPointerDown);
            window.addEventListener('touchstart', (e) => onPointerDown(e.touches[0]), { passive: false });
            window.addEventListener('mousemove', onPointerMove);
            window.addEventListener('touchmove', (e) => {
                if (camera.isPanning || glass.isDragging) { onPointerMove(e.touches[0]); e.preventDefault(); }
            }, { passive: false });
            window.addEventListener('mouseup', onPointerUp);
            window.addEventListener('touchend', onPointerUp);
            window.addEventListener('wheel', onWheel, { passive: false });

            [widthInput, heightInput].forEach(inp => {
                inp.addEventListener('mousedown', () => isAdjusting = true);
                inp.addEventListener('touchstart', () => isAdjusting = true);
                inp.addEventListener('mouseup', () => isAdjusting = false);
                inp.addEventListener('touchend', () => isAdjusting = false);
            });

            navArrow.addEventListener('click', jumpToGlass);
            requestAnimationFrame(animate);
        }

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
        }

        function parseUrlParams() {
            const params = new URLSearchParams(window.location.search);
            if (params.has('name')) { tagName = params.get('name'); tagNameInput.value = tagName; }
            if (params.has('color')) { tagColor = params.get('color'); tagColorInput.value = tagColor; }
            if (params.has('mins')) { 
                const m = parseInt(params.get('mins')); 
                minutesInput.value = m; duration = m * 60; timeRemaining = duration; 
            }
            if (params.has('width')) { const w = parseInt(params.get('width')); glass.w = w; widthInput.value = w; widthLabel.innerText = w; }
            if (params.has('height')) { const h = parseInt(params.get('height')); glass.h = h; heightInput.value = h; heightLabel.innerText = h; }
            updateGlassHeights(); calculateSpawnChance();

            if (params.has('start')) {
                isRemoteTimer = true;
                const t = parseInt(params.get('start')); startTimeTimestamp = t;
                const now = Date.now(); const elapsed = (now - t) / 1000;
                if (elapsed > 0) {
                    isActive = true; lastUpdateTime = now;
                    settingsGroup.classList.add('hidden'); resetBtn.classList.remove('hidden'); dragHint.classList.add('hidden');
                    startBtn.innerText = "Wird ausgeführt...";
                    if (elapsed < duration) { timeRemaining = duration - elapsed; preFillSand(elapsed); }
                    else { timeRemaining = 0; isActive = false; isFinished = true; timeSinceFinished = elapsed - duration; startBtn.innerText = "Neu Starten"; preFillSand(duration); if (timeSinceFinished >= duration) explodeGlass(); }
                }
            }
        }

        function screenToWorld(sx, sy) { return { x: (sx - camera.x) / camera.zoom, y: (sy - camera.y) / camera.zoom }; }
        function worldToScreen(wx, wy) { return { x: wx * camera.zoom + camera.x, y: wy * camera.zoom + camera.y }; }

        // Hilfsfunktion: Gibt true zurück, wenn mindestens ein Partikel horizontal im Glasbereich fällt
        function hasSandInGlassBoundaries() {
            const innerMargin = glass.thickness / 2;
            return particles.some(p => p.x >= glass.x + innerMargin && p.x <= glass.x + glass.w - innerMargin);
        }

        function onPointerDown(e) {
            if (e.target && e.target.closest('.glass-controls')) return;
            const wPos = screenToWorld(e.clientX, e.clientY);

            const isInGlass = wPos.x >= glass.x && wPos.x <= glass.x + glass.w && wPos.y >= glass.y && wPos.y <= glass.y + glass.h;

            if (!isActive && !isFinished && isInGlass) {
                // NEU: Nur sperren, wenn Sand im Glasbereich fällt (nicht daneben)
                if (hasSandInGlassBoundaries()) {
                    dragHint.innerText = "SAND FÄLLT NOCH INS GLAS...";
                    dragHint.classList.add('disabled-hint');
                    dragHint.classList.remove('hidden');
                    return; 
                }
                
                glass.isDragging = true; 
                glass.dragOffset.x = wPos.x - glass.x; 
                glass.dragOffset.y = wPos.y - glass.y; 
                dragHint.classList.add('hidden');
            } else {
                camera.isPanning = true; 
                camera.lastMouse.x = e.clientX; 
                camera.lastMouse.y = e.clientY;
            }
        }

        function onPointerMove(e) {
            if (glass.isDragging) {
                const wPos = screenToWorld(e.clientX, e.clientY);
                glass.x = wPos.x - glass.dragOffset.x; glass.y = wPos.y - glass.dragOffset.y;
            } else if (camera.isPanning) {
                camera.x += (e.clientX - camera.lastMouse.x); camera.y += (e.clientY - camera.lastMouse.y);
                camera.lastMouse.x = e.clientX; camera.lastMouse.y = e.clientY;
            }
        }

        function onPointerUp() { glass.isDragging = false; camera.isPanning = false; isAdjusting = false; }

        function onWheel(e) {
            if (e.target.closest('.glass-controls')) return;
            e.preventDefault();
            const factor = Math.pow(1.1, -e.deltaY / 100);
            const mouseWorldBefore = screenToWorld(e.clientX, e.clientY);
            camera.zoom = Math.max(0.1, Math.min(camera.zoom * factor, 5));
            const mouseWorldAfter = screenToWorld(e.clientX, e.clientY);
            camera.x += (mouseWorldAfter.x - mouseWorldBefore.x) * camera.zoom;
            camera.y += (mouseWorldAfter.y - mouseWorldBefore.y) * camera.zoom;
        }

        function jumpToGlass() {
            camera.targetX = width / 2 - (glass.x + glass.w / 2) * camera.zoom;
            camera.targetY = height / 2 - (glass.y + glass.h / 2) * camera.zoom;
            camera.isAnimating = true;
        }

        function updateNavigationIndicator() {
            const screenPos = worldToScreen(glass.x + glass.w/2, glass.y + glass.h/2);
            const margin = 60;
            const isOffScreen = screenPos.x < margin || screenPos.x > width - margin || screenPos.y < margin || screenPos.y > height - margin;
            if (isOffScreen) {
                navArrow.classList.remove('hidden');
                const angle = Math.atan2(screenPos.y - height/2, screenPos.x - width/2);
                let arrowX = width/2 + Math.cos(angle) * (Math.min(width, height) / 2 - margin);
                let arrowY = height/2 + Math.sin(angle) * (Math.min(width, height) / 2 - margin);
                navArrow.style.left = `${arrowX - 22}px`; navArrow.style.top = `${arrowY - 22}px`; navArrow.style.transform = `rotate(${angle * 180 / Math.PI + 90}deg)`;
            } else { navArrow.classList.add('hidden'); }
        }

        function preFillSand(seconds) {
            const totalParticlesNeeded = spawnChance * 60 * seconds;
            const phaseData = getPhaseData();
            for(let i = 0; i < Math.floor(totalParticlesNeeded); i++) {
                const x = Math.floor(Math.random() * (glass.w - glass.thickness));
                const settledIndex = findSettleIndexGlobal(x, glassSandHeights, true);
                glassSandHeights[settledIndex] += 0.45;
                const cornerOffset = getGlassBaselineOffset(settledIndex);
                glass.ctx.save(); glass.ctx.fillStyle = `hsl(${phaseData.h}, ${phaseData.s}%, ${phaseData.l + (Math.random()-0.5)*10}%)`;
                glass.ctx.globalAlpha = 0.85;
                glass.ctx.fillRect(settledIndex, (glass.h - glass.thickness / 2 - cornerOffset) - glassSandHeights[settledIndex], 1.5, 1.5);
                glass.ctx.restore();
            }
        }

        function findSettleIndexGlobal(index, heightsArray, isGlass = false) {
            let current = index;
            const limit = isGlass ? Math.floor(glass.thickness / 2) : 2;
            for (let i = 0; i < 4; i++) {
                const left = current - 1; const right = current + 1;
                let moved = false;
                const currentTotalH = heightsArray[current] + (isGlass ? getGlassBaselineOffset(current) : 0);
                if (left >= limit) {
                    const leftTotalH = heightsArray[left] + (isGlass ? getGlassBaselineOffset(left) : 0);
                    if (leftTotalH < currentTotalH - 0.8) { current = left; moved = true; }
                }
                if (!moved && right < heightsArray.length - limit) {
                    const rightTotalH = heightsArray[right] + (isGlass ? getGlassBaselineOffset(right) : 0);
                    if (rightTotalH < currentTotalH - 0.8) { current = right; moved = true; }
                }
                if (!moved) break;
            }
            return current;
        }

        function updateGlassHeights() {
            glass.buffer.width = glass.w; glass.buffer.height = glass.h;
            glassSandHeights = new Array(Math.floor(glass.w)).fill(0);
        }

        function calculateSpawnChance() {
            const usableH = glass.h - glass.thickness;
            const targetH = usableH * (duration / (duration + 300));
            spawnChance = (glass.w * targetH / 0.55) / (duration * 60);
            spawnChance = Math.max(0.01, Math.min(spawnChance, 15)); 
        }

        function getGlassBaselineOffset(localX) {
            const r = glass.cornerRadius;
            if (localX < r) { const ratio = 1 - (localX / r); return ratio * ratio * r; } 
            else if (localX > glass.w - r) { const ratio = 1 - ((glass.w - localX) / r); return ratio * ratio * r; }
            return 0;
        }

        class Particle {
            constructor(x, phaseData, y, isExplosion = false) {
                this.x = x; this.y = y; this.size = Math.random() * 1.3 + 0.7; this.wobbleOffset = Math.random() * Math.PI * 2; this.gravity = Math.random() * 0.05 + 0.02;
                this.color = `hsl(${phaseData.h + (Math.random()-0.5)*5}, ${phaseData.s}%, ${phaseData.l + (Math.random()-0.5)*15}%)`;
                this.baseOpacity = Math.random() * 0.3 + 0.6; this.opacity = this.baseOpacity;
                if (isExplosion) { const a = Math.random() * Math.PI * 2; const f = Math.random() * 10 + 5; this.vx = Math.cos(a) * f; this.speedY = Math.sin(a) * f; }
                else { this.vx = (Math.random() - 0.5) * 0.3; this.speedY = Math.random() * 1.5 + 2.5; }
                this.drift = this.vx;
            }
            update(delta) {
                this.speedY += this.gravity; this.y += this.speedY; this.x += this.drift + Math.sin(Date.now() * 0.05 + this.wobbleOffset) * 0.5;
                if (!isExploded && this.x > glass.x + glass.thickness/2 && this.x < glass.x + glass.w - glass.thickness/2 && this.y > glass.y) {
                    const localX = Math.floor(this.x - glass.x); const cornerOffset = getGlassBaselineOffset(localX);
                    const floorY = (glass.y + glass.h - glass.thickness / 2 - cornerOffset) - glassSandHeights[localX];
                    if (this.y >= floorY) { this.drawToBuffer(localX); return false; }
                }
                return this.y < 5000;
            }
            drawToBuffer(index) {
                const settledIndex = findSettleIndexGlobal(index, glassSandHeights, true); glassSandHeights[settledIndex] += 0.45;
                const cornerOffset = getGlassBaselineOffset(settledIndex);
                glass.ctx.save(); glass.ctx.fillStyle = this.color; glass.ctx.globalAlpha = this.baseOpacity;
                glass.ctx.fillRect(settledIndex, (glass.h - glass.thickness / 2 - cornerOffset) - glassSandHeights[settledIndex], this.size, this.size);
                glass.ctx.restore();
            }
            draw() { ctx.save(); ctx.fillStyle = this.color; ctx.globalAlpha = this.opacity; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); ctx.restore(); }
        }

        class SteamParticle {
            constructor(x, y) { this.x = x; this.y = y; this.vx = (Math.random()-0.5)*0.6; this.vy = -(Math.random()*0.8+0.4); this.life = 1.0; this.decay = Math.random()*0.005+0.005; this.size = Math.random()*15+10; }
            update() { this.x += this.vx; this.y += this.vy; this.life -= this.decay; return this.life > 0; }
            draw() { ctx.save(); ctx.globalAlpha = this.life * 0.15; ctx.fillStyle = 'white'; ctx.filter = 'blur(8px)'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill(); ctx.restore(); }
        }

        function explodeGlass() {
            if (isExploded) return; isExploded = true; const phaseData = getPhaseData();
            for (let x = 0; x < glassSandHeights.length; x += 3) {
                if (glassSandHeights[x] > 0) {
                    const count = Math.min(15, Math.ceil(glassSandHeights[x] / 2));
                    for (let j = 0; j < count; j++) particles.push(new Particle(glass.x + x, phaseData, glass.y + glass.h - Math.random() * glassSandHeights[x], true));
                }
            }
            glass.ctx.clearRect(0, 0, glass.w, glass.h); glassSandHeights.fill(0);
        }

        function drawSpawnCloud(x, y, w, color) {
            if (!isActive || isFinished) return;
            ctx.save(); const pulse = (Math.sin(Date.now() * 0.003) + 1) / 2;
            const grad = ctx.createRadialGradient(x + w/2, y, 0, x + w/2, y, w * 0.6);
            grad.addColorStop(0, color.replace(')', `, ${0.4 + pulse * 0.2})`).replace('hsl', 'hsla')); grad.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = grad; ctx.filter = 'blur(10px)'; ctx.beginPath(); ctx.ellipse(x + w/2, y, w * 0.8, 30, 0, 0, Math.PI * 2); ctx.fill(); ctx.restore();
        }

        function drawUIElements() {
            if (isExploded) return; const { x, y, w, h, thickness, cornerRadius } = glass; const currentPhase = getPhaseData();
            ctx.save(); if (isActive && particles.length > 0) { ctx.shadowBlur = 30; ctx.shadowColor = `hsl(${currentPhase.h}, ${currentPhase.s}%, 65%)`; }
            ctx.fillStyle = 'rgba(255, 255, 255, 0.02)'; ctx.fillRect(x, y, w, h);
            ctx.strokeStyle = glass.isDragging ? 'rgba(255, 255, 255, 0.5)' : 'rgba(255, 255, 255, 0.22)';
            ctx.lineWidth = thickness; ctx.lineCap = 'round'; ctx.beginPath(); ctx.moveTo(x, y); ctx.lineTo(x, y + h - cornerRadius); ctx.quadraticCurveTo(x, y + h, x + cornerRadius, y + h); ctx.lineTo(x + w - cornerRadius, y + h); ctx.quadraticCurveTo(x + w, y + h, x + w, y + h - cornerRadius); ctx.lineTo(x + w, y); ctx.stroke();
            const D_sec = duration; const pixelsPerMinute = (h - thickness / 2) / ((D_sec + 300) / 60); ctx.textAlign = 'right'; ctx.font = '500 9px Inter';
            for (let min = 5; min <= (D_sec + 300) / 60; min += 5) {
                const markY = (y + h - thickness / 2) - (min * pixelsPerMinute); if (markY < y + 10) continue;
                const isTarget = Math.abs(min - D_sec / 60) < 0.1; ctx.strokeStyle = isTarget ? 'rgba(255, 255, 255, 0.4)' : 'rgba(255, 255, 255, 0.15)';
                ctx.beginPath(); ctx.moveTo(x, markY); ctx.lineTo(x + (isTarget ? 18 : 12), markY); ctx.stroke();
                ctx.fillStyle = isTarget ? 'rgba(255, 255, 255, 0.6)' : 'rgba(255, 255, 255, 0.3)'; ctx.fillText(min, x - 10, markY + 3);
            }
            const tagX = x + w + 35; const tagY = y + 50; const tagW = 95; const tagH = isFinished ? 50 : 70;
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)'; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(x + w, y + 25); ctx.lineTo(tagX + 10, tagY + 5); ctx.stroke();
            ctx.fillStyle = tagColor; ctx.beginPath(); ctx.moveTo(tagX + 12, tagY); ctx.lineTo(tagX + tagW, tagY); ctx.lineTo(tagX + tagW, tagY + tagH); ctx.lineTo(tagX, tagY + tagH); ctx.lineTo(tagX, tagY + 12); ctx.closePath(); ctx.fill();
            ctx.fillStyle = 'white'; ctx.textAlign = 'center'; ctx.font = '600 8px Inter'; ctx.fillText(tagName.toUpperCase(), tagX + tagW/2, tagY + 15);
            if (!isFinished) { ctx.fillStyle = 'white'; ctx.font = '200 16px Inter'; ctx.fillText(formatTime(timeRemaining), tagX + tagW/2, tagY + 41); ctx.fillStyle = 'rgba(255, 255, 255, 0.6)'; ctx.font = '400 10px Inter'; ctx.fillText(formatTime(duration - timeRemaining), tagX + tagW/2, tagY + 63); }
            else { ctx.fillStyle = 'white'; ctx.font = '200 20px Inter'; ctx.fillText("00:00", tagX + tagW/2, tagY + 38); }
            ctx.fillStyle = `hsl(${getPhaseData().h}, ${getPhaseData().s}%, ${getPhaseData().l}%)`; ctx.font = '700 7px Inter'; ctx.fillText(getPhaseData().label.toUpperCase(), tagX + tagW/2, tagY + tagH + 12); ctx.restore();
        }

        function getPhaseData() { const p = timeRemaining / duration; return phases.find(ph => p >= ph.limit) || phases[phases.length - 1]; }
        function formatTime(seconds) { const m = Math.floor(Math.max(0, seconds) / 60); const s = Math.floor(Math.max(0, seconds) % 60); return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`; }

        function animate() {
            const now = Date.now(); const delta = (now - (lastUpdateTime || now)) / 1000; lastUpdateTime = now;
            if (camera.isAnimating) { camera.x += (camera.targetX - camera.x) * 0.1; camera.y += (camera.targetY - camera.y) * 0.1; if (Math.abs(camera.x - camera.targetX) < 1) camera.isAnimating = false; }
            ctx.clearRect(0, 0, width, height); ctx.save(); ctx.translate(camera.x, camera.y); ctx.scale(camera.zoom, camera.zoom);
            const phaseData = getPhaseData(); const phaseColor = `hsl(${phaseData.h}, ${phaseData.s}%, ${phaseData.l}%)`;
            drawSpawnCloud(glass.x, glass.y - 100, glass.w, phaseColor);
            if (!isExploded) ctx.drawImage(glass.buffer, glass.x, glass.y);
            if (isActive && timeRemaining > 0) { timeRemaining -= delta; if (timeRemaining <= 0) { timeRemaining = 0; isActive = false; isFinished = true; startBtn.innerText = "Neu Starten"; } }
            else if (isFinished) { timeSinceFinished += delta; if (!isExploded && timeSinceFinished >= duration) explodeGlass(); }
            if (isFinished && !isExploded) { const pulse = (Math.sin(Date.now() * 0.005) + 1) / 2; ctx.save(); ctx.globalCompositeOperation = 'lighter'; ctx.globalAlpha = pulse * 0.4; ctx.drawImage(glass.buffer, glass.x, glass.y); ctx.restore(); }
            if (isFinished) {
                if (Math.random() < 0.25) steamParticles.push(new SteamParticle(glass.x + Math.random()*glass.w, isExploded ? 400 : glass.y + glass.h));
                for (let i = steamParticles.length - 1; i >= 0; i--) if (steamParticles[i].update()) steamParticles[i].draw(); else steamParticles.splice(i, 1);
                ctx.save(); ctx.textAlign = 'center'; ctx.fillStyle = 'white'; ctx.font = '600 24px Inter'; ctx.fillText("+" + formatTime(timeSinceFinished), glass.x + glass.w / 2, glass.y + glass.h - 70); ctx.restore();
            }
            drawUIElements(); 
            if (isActive && timeRemaining > 0) {
                let toSpawn = spawnChance * 60 * delta;
                for (let i = 0; i < Math.floor(toSpawn) + (Math.random() < (toSpawn % 1) ? 1 : 0); i++) {
                    // Partikel Spawning (mit Spill-Wahrscheinlichkeit)
                    let x;
                    if (Math.random() > 0.008) x = glass.x + 10 + Math.random()*(glass.w-20);
                    else x = Math.random() > 0.5 ? glass.x - 15 - Math.random()*20 : glass.x + glass.w + 15 + Math.random()*20;
                    particles.push(new Particle(x, phaseData, glass.y - 100));
                }
            }
            for (let i = particles.length - 1; i >= 0; i--) if (particles[i].update(delta)) particles[i].draw(); else particles.splice(i, 1);
            ctx.restore(); updateNavigationIndicator();
            
            // STATUS LOGIK FÜR DRAG-HINT (Präzise gefiltert)
            if (!isActive && !isFinished && !isExploded) {
                if (hasSandInGlassBoundaries()) {
                    dragHint.innerText = "SAND FÄLLT NOCH INS GLAS...";
                    dragHint.classList.add('disabled-hint');
                    dragHint.classList.remove('hidden');
                } else {
                    dragHint.innerText = "Ziehen zum Bewegen";
                    dragHint.classList.remove('disabled-hint');
                    if (camera.isPanning) dragHint.classList.add('hidden');
                    else dragHint.classList.remove('hidden');
                }
            } else {
                dragHint.classList.add('hidden');
            }

            if (!isAdjusting) updateControlPosition(); 
            requestAnimationFrame(animate);
        }

        function updateControlPosition() {
            const screenPos = worldToScreen(glass.x + glass.w/2, glass.y + glass.h);
            controls.style.left = `${screenPos.x - controls.offsetWidth / 2}px`;
            controls.style.top = `${screenPos.y + 20 * camera.zoom}px`;
            controls.style.transform = `scale(${Math.max(0.6, Math.min(camera.zoom, 1))})`;
        }

        tagColorInput.addEventListener('input', (e) => tagColor = e.target.value);
        tagNameInput.addEventListener('input', (e) => tagName = e.target.value || 'Fokus');
        
        widthInput.addEventListener('input', (e) => {
            if (isActive || isFinished) return;
            const newW = parseInt(e.target.value); const diff = newW - glass.w;
            glass.x -= diff / 2;
            glass.w = newW; widthLabel.innerText = newW; updateGlassHeights();
        });
        heightInput.addEventListener('input', (e) => {
            if (isActive || isFinished) return;
            const newH = parseInt(e.target.value); const diff = newH - glass.h;
            glass.y -= diff; 
            glass.h = newH; heightLabel.innerText = newH; updateGlassHeights();
        });
        
        startBtn.addEventListener('click', () => {
            if (isRemoteTimer && isActive) return;
            if (isFinished) { resetSession(); return; }
            if (!isActive) {
                if (timeRemaining === duration) {
                    duration = (parseInt(minutesInput.value) || 25) * 60; timeRemaining = duration;
                    startTimeTimestamp = Date.now(); calculateSpawnChance(); 
                    settingsGroup.classList.add('hidden'); resetBtn.classList.remove('hidden'); 
                    glass.ctx.clearRect(0, 0, glass.w, glass.h);
                }
                isActive = true; lastUpdateTime = Date.now(); 
                startBtn.innerText = isRemoteTimer ? "Wird ausgeführt..." : "Pause";
            } else { isActive = false; startBtn.innerText = "Fortsetzen"; }
        });
        
        resetBtn.addEventListener('click', resetSession);
        shareBtn.addEventListener('click', () => {
            const url = new URL(window.location.href); url.search = ''; url.searchParams.set('name', tagName); url.searchParams.set('color', tagColor); url.searchParams.set('mins', Math.floor(duration / 60)); url.searchParams.set('width', glass.w); url.searchParams.set('height', glass.h);
            if (startTimeTimestamp && (isActive || isFinished)) url.searchParams.set('start', startTimeTimestamp);
            const input = document.createElement('input'); input.value = url.href; document.body.appendChild(input); input.select(); document.execCommand('copy'); document.body.removeChild(input);
            toast.style.opacity = '1'; setTimeout(() => toast.style.opacity = '0', 2000);
        });
        
        function resetSession() {
            isActive = false; isFinished = false; isExploded = false; isRemoteTimer = false; isAdjusting = false;
            particles = []; steamParticles = []; startTimeTimestamp = null; glassSandHeights.fill(0); glass.ctx.clearRect(0, 0, glass.w, glass.h);
            duration = (parseInt(minutesInput.value) || 25) * 60; timeRemaining = duration; timeSinceFinished = 0; pulsePhase = 0;
            startBtn.innerText = "Start"; settingsGroup.classList.remove('hidden'); resetBtn.classList.add('hidden'); 
            try { window.history.replaceState({}, document.title, window.location.pathname); } catch (e) {}
        }
        
        init();
    </script>
</body>
