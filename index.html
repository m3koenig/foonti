<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digitaler Sandregen - v1.0.0</title>
    <style>
        :root {
            --bg-color: #050505;
            --text-color: #e0e0e0;
            --accent-color: #7b2ff7;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            color: var(--text-color);
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
        }

        .controls {
            position: absolute;
            bottom: 5vh;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
        }

        .input-group {
            background: rgba(255, 255, 255, 0.03);
            padding: 0.5rem 1.2rem;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            display: flex;
            align-items: center;
            gap: 12px;
        }

        input[type="number"] {
            background: transparent;
            border: none;
            color: white;
            width: 45px;
            font-size: 1.1rem;
            text-align: center;
            outline: none;
        }

        input[type="text"] {
            background: transparent;
            border: none;
            color: white;
            width: 80px;
            font-size: 0.9rem;
            text-align: center;
            outline: none;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        input[type="text"]:focus {
            opacity: 1;
        }

        input[type="color"] {
            -webkit-appearance: none;
            border: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            cursor: pointer;
            background: transparent;
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch {
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
        }

        .button-row {
            display: flex;
            gap: 1rem;
        }

        button {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 30px;
            cursor: pointer;
            backdrop-filter: blur(15px);
            transition: all 0.3s ease;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="canvas-container">
        <canvas id="sandCanvas"></canvas>
    </div>

    <div class="controls">
        <div class="input-group" id="settings-group">
            <input type="text" id="tagNameInput" value="Fokus" placeholder="Name" maxlength="12">
            <div style="width: 1px; height: 20px; background: rgba(255,255,255,0.1); margin: 0 5px;"></div>
            <input type="number" id="minutesInput" value="25" min="1" max="120">
            <span style="font-size: 0.7rem; opacity: 0.5; letter-spacing: 0.1em;">MINUTEN</span>
            <div style="width: 1px; height: 20px; background: rgba(255,255,255,0.1); margin: 0 5px;"></div>
            <input type="color" id="tagColorInput" value="#191919" title="Tag Farbe wählen">
        </div>
        <div class="button-row">
            <button id="startBtn">Start</button>
            <button id="resetBtn" class="hidden">Reset</button>
        </div>
    </div>

    <script>
        /**
         * Digitaler Sandregen v1.0.0
         * Änderungen: 
         * - Neu: Dampf-Effekt nach Abschluss des Timers
         * - Neu: Count-up Timer im aufsteigenden Dampf zeigt verstrichene Zeit nach Ende
         * - Neu: Pulsierender Sandeffekt bei Fertigstellung
         * - Neu: Anpassbarer Name auf dem Tag (Standard: "Fokus"), editierbar über die UI
         * - Neu: "Spill"-Effekt (Sand außerhalb des Glases) drastisch reduziert für "Versehen"-Optik
         * - Optimierung: Partikel-System verbessert durch Schwerkraft-Beschleunigung und Wobble-Effekt
         * - Optimierung: Verfeinerte findSettleIndex Logik für natürlichere Schüttkegel (Sandhaufen)
         * - Visuell: Partikel pulsieren leicht in ihrer Opazität beim Fallen für organischen Glanz
         * - Neu: Das Glas bietet nun immer Platz für 5 Minuten mehr als eingestellt (Puffer-Volumen)
         * - Optimierung: spawnChance Berechnung korrigiert, um die Zielhöhe exakt zu treffen
         * - UI: Messpunkte und Skalierung berücksichtigen nun die 5-Minuten-Erweiterung
         * - Fehlerbehebung: Flackern minimiert durch strikte Render-Order und Alpha-Reset im Buffer
         * - Optimierung: Sand-Abstand zur Glaswand vergrößert (Kollisionsschutz)
         * - Neu: Sand bündig auf dem Glasboden (Offset Korrektur auf thickness/2)
         * - Neu: Sand näher an die Glaswände gerückt (Marge reduziert)
         * - Neu: Physikalisch korrekte Kurven-Kollision in den Glasecken (Radius 15px)
         */

        const canvas = document.getElementById('sandCanvas');
        const ctx = canvas.getContext('2d');
        
        const bgCanvas = document.createElement('canvas');
        const bgCtx = bgCanvas.getContext('2d');

        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('resetBtn');
        const minutesInput = document.getElementById('minutesInput');
        const tagColorInput = document.getElementById('tagColorInput');
        const tagNameInput = document.getElementById('tagNameInput');
        const settingsGroup = document.getElementById('settings-group');

        let width, height;
        let particles = [];
        let steamParticles = [];
        let isActive = false;
        let isFinished = false;
        let duration = 25 * 60; 
        let timeRemaining = duration;
        let timeSinceFinished = 0;
        let lastTimestamp = 0;
        let tagColor = '#191919';
        let tagName = 'Fokus';

        let glass = { x: 0, y: 0, w: 0, h: 0, thickness: 6, cornerRadius: 15 };
        let glassSandHeights = [];
        let floorSandHeights = [];
        let spawnChance = 0.3;

        const phases = [
            { limit: 0.8, h: 263, s: 92, l: 60, label: 'Ankommen' },
            { limit: 0.4, h: 222, s: 74, l: 45, label: 'Deep Flow' },
            { limit: 0.1, h: 180, s: 100, l: 25, label: 'Endspurt' },
            { limit: 0, h: 45, s: 100, l: 50, label: 'Abschluss' }
        ];

        function init() {
            resize();
            window.addEventListener('resize', resize);
            requestAnimationFrame(animate);
        }

        function resize() {
            width = window.innerWidth;
            height = window.innerHeight;
            canvas.width = width;
            canvas.height = height;
            bgCanvas.width = width;
            bgCanvas.height = height;

            const glassW = Math.min(width * 0.5, 280);
            const glassH = Math.min(height * 0.45, 380);
            glass.w = glassW;
            glass.h = glassH;
            glass.x = (width - glassW) / 2;
            glass.y = (height - glassH) / 2;

            glassSandHeights = new Array(Math.floor(glass.w)).fill(0);
            floorSandHeights = new Array(Math.floor(width)).fill(0);
        }

        function calculateSpawnChance() {
            const totalMinutes = duration / 60;
            const visualCapacityMinutes = totalMinutes + 5; 
            
            const usableHeight = glass.h - glass.thickness;
            const targetHeight = usableHeight * (totalMinutes / visualCapacityMinutes);
            
            const totalVolumeNeeded = glass.w * targetHeight;
            const incrementPerParticle = 0.55; 
            
            spawnChance = (totalVolumeNeeded / incrementPerParticle) / duration;
            spawnChance = Math.max(0.1, Math.min(spawnChance, 12)); 
        }

        /**
         * Berechnet den vertikalen Versatz basierend auf der Abrundung des Glases.
         */
        function getGlassBaselineOffset(localX) {
            const r = glass.cornerRadius;
            if (localX < r) {
                const ratio = 1 - (localX / r);
                return ratio * ratio * r;
            } else if (localX > glass.w - r) {
                const ratio = 1 - ((glass.w - localX) / r);
                return ratio * ratio * r;
            }
            return 0;
        }

        class Particle {
            constructor(x, phaseData) {
                this.x = x;
                this.y = -15;
                this.size = Math.random() * 1.3 + 0.7;
                
                this.wobbleOffset = Math.random() * Math.PI * 2;
                this.wobbleSpeed = Math.random() * 0.05 + 0.02;
                this.gravity = Math.random() * 0.05 + 0.02;
                
                const isSparkle = Math.random() > 0.98;
                const lightnessVar = (Math.random() - 0.5) * 15;
                const hueVar = (Math.random() - 0.5) * 5;
                
                if (isSparkle) {
                    this.color = `hsl(${phaseData.h}, ${phaseData.s}%, 95%)`;
                    this.baseOpacity = 1;
                } else {
                    this.color = `hsl(${phaseData.h + hueVar}, ${phaseData.s}%, ${phaseData.l + lightnessVar}%)`;
                    this.baseOpacity = Math.random() * 0.3 + 0.6;
                }
                
                this.opacity = this.baseOpacity;
                this.speedY = Math.random() * 1.5 + 2.5;
                this.drift = (Math.random() - 0.5) * 0.3;
            }

            update() {
                this.speedY += this.gravity;
                this.y += this.speedY;
                
                const wobble = Math.sin(Date.now() * this.wobbleSpeed + this.wobbleOffset) * 0.5;
                this.x += this.drift + wobble;

                this.opacity = this.baseOpacity * (0.9 + Math.sin(Date.now() * 0.01 + this.wobbleOffset) * 0.1);

                const innerMargin = glass.thickness / 2; 
                if (this.x > glass.x + innerMargin && this.x < glass.x + glass.w - innerMargin && this.y > glass.y) {
                    const localX = Math.floor(this.x - glass.x);
                    const currentH = glassSandHeights[localX];
                    const cornerOffset = getGlassBaselineOffset(localX);
                    const floorY = (glass.y + glass.h - glass.thickness / 2 - cornerOffset) - currentH;

                    if (this.y >= floorY) {
                        if (currentH < glass.h - glass.thickness - 2) {
                            this.drawToBuffer(localX, 'glass');
                        }
                        return false;
                    }
                } 
                else if (this.y >= height - floorSandHeights[Math.floor(this.x)]) {
                    const floorX = Math.floor(this.x);
                    if (floorX >= 0 && floorX < width) {
                        this.drawToBuffer(floorX, 'floor');
                    }
                    return false;
                }

                return this.y < height + 20;
            }

            findSettleIndex(index, heightsArray, isGlass = false) {
                let current = index;
                const limit = isGlass ? Math.floor(glass.thickness / 2) : 2;
                
                for (let i = 0; i < 4; i++) {
                    const left = current - 1;
                    const right = current + 1;
                    let moved = false;
                    
                    const currentTotalH = heightsArray[current] + (isGlass ? getGlassBaselineOffset(current) : 0);
                    
                    if (left >= limit) {
                        const leftTotalH = heightsArray[left] + (isGlass ? getGlassBaselineOffset(left) : 0);
                        if (leftTotalH < currentTotalH - 0.8) {
                            current = left; moved = true;
                        }
                    }
                    
                    if (!moved && right < heightsArray.length - limit) {
                        const rightTotalH = heightsArray[right] + (isGlass ? getGlassBaselineOffset(right) : 0);
                        if (rightTotalH < currentTotalH - 0.8) {
                            current = right; moved = true;
                        }
                    }
                    
                    if (!moved) break;
                }
                return current;
            }

            drawToBuffer(index, type) {
                bgCtx.save();
                bgCtx.fillStyle = this.color;
                bgCtx.globalAlpha = this.baseOpacity;
                
                if (type === 'glass') {
                    const settledIndex = this.findSettleIndex(index, glassSandHeights, true);
                    const increment = 0.4 + Math.random() * 0.1;
                    glassSandHeights[settledIndex] += increment;
                    
                    if (settledIndex > 0) glassSandHeights[settledIndex-1] += increment * 0.2;
                    if (settledIndex < glassSandHeights.length-1) glassSandHeights[settledIndex+1] += increment * 0.2;
                    
                    const cornerOffset = getGlassBaselineOffset(settledIndex);
                    bgCtx.fillRect(glass.x + settledIndex, (glass.y + glass.h - glass.thickness / 2 - cornerOffset) - glassSandHeights[settledIndex], this.size, this.size);
                } else {
                    const settledIndex = this.findSettleIndex(index, floorSandHeights, false);
                    floorSandHeights[settledIndex] += 0.3;
                    bgCtx.fillRect(settledIndex, height - floorSandHeights[settledIndex], this.size, this.size);
                }
                bgCtx.restore();
            }

            draw() {
                ctx.save();
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.opacity;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        /**
         * Dampf-Partikel System v1.0.0
         */
        class SteamParticle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 0.6;
                this.vy = -(Math.random() * 0.8 + 0.4);
                this.life = 1.0;
                this.decay = Math.random() * 0.005 + 0.005;
                this.size = Math.random() * 15 + 10;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= this.decay;
                return this.life > 0;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life * 0.15;
                ctx.fillStyle = 'white';
                ctx.filter = 'blur(8px)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function drawUIElements() {
            const { x, y, w, h, thickness, cornerRadius } = glass;
            
            ctx.save();
            ctx.globalAlpha = 1.0;
            ctx.shadowBlur = 0;
            ctx.shadowColor = 'transparent';
            ctx.globalCompositeOperation = 'source-over';

            // Glaseffekt
            ctx.fillStyle = 'rgba(255, 255, 255, 0.02)';
            ctx.fillRect(x, y, w, h);

            ctx.strokeStyle = 'rgba(255, 255, 255, 0.22)';
            ctx.lineWidth = thickness;
            ctx.lineCap = 'round';
            ctx.beginPath();
            ctx.moveTo(x, y);
            ctx.lineTo(x, y + h - cornerRadius);
            ctx.quadraticCurveTo(x, y + h, x + cornerRadius, y + h);
            ctx.lineTo(x + w - cornerRadius, y + h);
            ctx.quadraticCurveTo(x + w, y + h, x + w, y + h - cornerRadius);
            ctx.lineTo(x + w, y);
            ctx.stroke();

            // Glanz-Gradient
            const g = ctx.createLinearGradient(x, y, x+w, y);
            g.addColorStop(0, 'rgba(255,255,255,0.01)'); 
            g.addColorStop(0.05, 'rgba(255,255,255,0.08)'); 
            g.addColorStop(0.1, 'rgba(255,255,255,0.02)');
            g.addColorStop(0.85, 'rgba(255,255,255,0.0)');
            g.addColorStop(0.95, 'rgba(255,255,255,0.06)');
            ctx.fillStyle = g;
            ctx.fillRect(x, y, w, h);

            // Messpunkte
            const totalMinutes = duration / 60;
            const visualCapacityMinutes = totalMinutes + 5;
            const pixelsPerMinute = (h - thickness / 2) / visualCapacityMinutes; 
            
            ctx.textAlign = 'right';
            ctx.font = '500 9px Inter';

            for (let min = 5; min <= visualCapacityMinutes; min += 5) {
                const markY = (y + h - thickness / 2) - (min * pixelsPerMinute);
                const isTarget = Math.abs(min - totalMinutes) < 0.1;
                
                ctx.strokeStyle = isTarget ? 'rgba(255, 255, 255, 0.4)' : 'rgba(255, 255, 255, 0.15)';
                ctx.beginPath();
                ctx.moveTo(x, markY);
                ctx.lineTo(x + (isTarget ? 18 : 12), markY);
                ctx.stroke();
                
                ctx.fillStyle = isTarget ? 'rgba(255, 255, 255, 0.6)' : 'rgba(255, 255, 255, 0.3)';
                ctx.fillText(min, x - 10, markY + 3);
            }

            // Tag UI
            const tagX = x + w + 35;
            const tagY = y + 50;
            
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            ctx.moveTo(x + w, y + 25);
            ctx.lineTo(tagX + 15, tagY + 5);
            ctx.stroke();

            ctx.fillStyle = tagColor;
            ctx.beginPath();
            ctx.moveTo(tagX + 12, tagY);
            ctx.lineTo(tagX + 90, tagY);
            ctx.lineTo(tagX + 90, tagY + 45);
            ctx.lineTo(tagX, tagY + 45);
            ctx.lineTo(tagX, tagY + 12);
            ctx.closePath();
            ctx.fill();
            
            ctx.fillStyle = '#050505';
            ctx.beginPath();
            ctx.arc(tagX + 12, tagY + 12, 3, 0, Math.PI * 2);
            ctx.fill();

            // Tag Inhalt
            ctx.textAlign = 'center';
            ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
            ctx.font = '600 8px Inter';
            ctx.letterSpacing = "1px";
            ctx.fillText(tagName.toUpperCase(), tagX + 50, tagY + 15);

            ctx.fillStyle = 'white';
            ctx.font = '200 20px Inter';
            ctx.letterSpacing = "0px";
            ctx.fillText(formatTime(timeRemaining), tagX + 50, tagY + 35);
            
            const currentPhase = getPhaseData();
            ctx.fillStyle = `hsl(${currentPhase.h}, ${currentPhase.s}%, ${currentPhase.l}%)`;
            ctx.font = '700 7px Inter';
            ctx.letterSpacing = "2px";
            ctx.fillText(currentPhase.label.toUpperCase(), tagX + 50, tagY + 58);

            ctx.restore();
        }

        function getPhaseData() {
            const p = timeRemaining / duration;
            return phases.find(ph => p >= ph.limit) || phases[phases.length - 1];
        }

        function formatTime(seconds) {
            const m = Math.floor(Math.max(0, seconds) / 60);
            const s = Math.floor(Math.max(0, seconds) % 60);
            return `${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        function spawnParticles() {
            if (!isActive || timeRemaining <= 0) return;
            let toSpawn = Math.floor(spawnChance);
            if (Math.random() < (spawnChance % 1)) toSpawn++;
            const phaseData = getPhaseData();
            
            const spawnMargin = (glass.thickness / 2) + 1;

            for (let i = 0; i < toSpawn; i++) {
                let x;
                if (Math.random() > 0.006) {
                    x = (glass.x + spawnMargin) + Math.random() * (glass.w - spawnMargin * 2);
                } else {
                    const side = Math.random() > 0.5 ? 1 : -1;
                    const margin = Math.random() * 20;
                    x = side === 1 ? (glass.x + glass.w) + margin : (glass.x) - margin;
                }
                particles.push(new Particle(x, phaseData));
            }
        }

        function animate(timestamp) {
            ctx.clearRect(0, 0, width, height);
            ctx.drawImage(bgCanvas, 0, 0);

            if (!lastTimestamp) lastTimestamp = timestamp;
            const delta = (timestamp - lastTimestamp) / 1000;

            if (isActive && timeRemaining > 0) {
                timeRemaining -= delta;
                if (timeRemaining <= 0) {
                    timeRemaining = 0; isActive = false; isFinished = true;
                    startBtn.innerText = "Neu Starten";
                    timeSinceFinished = 0;
                }
            } else if (isFinished) {
                timeSinceFinished += delta;
            }
            lastTimestamp = timestamp;

            // Fertigstellungs-Visualisierungen v1.0.0
            if (isFinished) {
                const pulse = (Math.sin(Date.now() / 400) + 1) / 2;
                ctx.save();
                ctx.globalCompositeOperation = 'lighter';
                ctx.globalAlpha = pulse * 0.45;
                ctx.drawImage(bgCanvas, 0, 0);
                ctx.restore();

                // Dampf-Erzeugung
                if (Math.random() < 0.25) {
                    const steamX = glass.x + Math.random() * glass.w;
                    const steamY = (glass.y + glass.h - glass.thickness) - Math.random() * 20;
                    steamParticles.push(new SteamParticle(steamX, steamY));
                }

                // Dampf-Update und Render
                for (let i = steamParticles.length - 1; i >= 0; i--) {
                    if (steamParticles[i].update()) {
                        steamParticles[i].draw();
                    } else {
                        steamParticles.splice(i, 1);
                    }
                }

                // Count-up Timer im Dampf
                ctx.save();
                ctx.textAlign = 'center';
                ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                ctx.font = '300 12px Inter';
                ctx.letterSpacing = "2px";
                const timerY = glass.y + glass.h - 80;
                ctx.fillText("ZEIT SEIT ABSCHLUSS", glass.x + glass.w / 2, timerY - 15);
                ctx.fillStyle = 'white';
                ctx.font = '600 24px Inter';
                ctx.fillText("+" + formatTime(timeSinceFinished), glass.x + glass.w / 2, timerY + 10);
                ctx.restore();
            }

            drawUIElements();
            spawnParticles();

            for (let i = particles.length - 1; i >= 0; i--) {
                if (particles[i].update()) {
                    particles[i].draw();
                } else {
                    particles.splice(i, 1);
                }
            }

            requestAnimationFrame(animate);
        }

        tagColorInput.addEventListener('input', (e) => tagColor = e.target.value);
        tagNameInput.addEventListener('input', (e) => tagName = e.target.value || 'Fokus');

        startBtn.addEventListener('click', () => {
            if (isFinished) { resetSession(); return; }
            if (!isActive) {
                if (timeRemaining === duration) {
                    const mins = parseInt(minutesInput.value) || 25;
                    duration = mins * 60; timeRemaining = duration;
                    calculateSpawnChance();
                    settingsGroup.classList.add('hidden');
                    resetBtn.classList.remove('hidden');
                    bgCtx.clearRect(0, 0, width, height);
                }
                isActive = true; startBtn.innerText = "Pause";
            } else {
                isActive = false; startBtn.innerText = "Fortsetzen";
            }
        });
        resetBtn.addEventListener('click', resetSession);

        function resetSession() {
            isActive = false; isFinished = false; particles = []; steamParticles = [];
            glassSandHeights.fill(0); floorSandHeights.fill(0);
            bgCtx.clearRect(0, 0, width, height);
            const mins = parseInt(minutesInput.value) || 25;
            duration = mins * 60; timeRemaining = duration;
            timeSinceFinished = 0;
            startBtn.innerText = "Start";
            settingsGroup.classList.remove('hidden'); resetBtn.classList.add('hidden');
        }

        init();
    </script>
</body>
</html>
